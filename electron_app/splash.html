<!DOCTYPE html>
<html>
<head>
  <title>OmniTwin Boot Sequence</title>
  <style>
    body { background-color: #1a252f; color: #2ecc71; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    h1 { font-size: 2em; margin-bottom: 10px; }
    p { max-width: 720px; text-align: center; line-height: 1.5; }
    #status { color: #e5e7eb; font-size: 1rem; }
    #detail { color: #9ca3af; font-size: 0.95rem; }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #2ecc71; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-top: 20px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>Awakening OmniTwin Core...</h1>
  <p id="status">Starting the offline workbench, local memory, and profession training runtime.</p>
  <p id="detail">Please wait while the desktop services come online.</p>
  <div class="loader"></div>
</body>
</html>
