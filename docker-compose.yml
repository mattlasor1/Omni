version: '3.8'

services:
  # -------------------------
  # Core Infrastructure
  # -------------------------
  omnitwin-redis:
    image: redis:7-alpine
    container_name: omnitwin-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  omnitwin-qdrant:
    image: qdrant/qdrant:latest
    container_name: omnitwin-qdrant
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 5s
      timeout: 3s
      retries: 5

  # -------------------------
  # OmniTwin Application
  # -------------------------
  omnitwin-api:
    build: 
      context: .
      dockerfile: Dockerfile.api
    container_name: omnitwin-api
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      omnitwin-redis:
        condition: service_healthy
      omnitwin-qdrant:
        condition: service_healthy
    environment:
      - REDIS_HOST=omnitwin-redis
      - QDRANT_HOST=omnitwin-qdrant
      - OMNI_OFFLINE_STRICT=true
      - OMNI_ENABLE_MODEL_DOWNLOADS=false
      - OMNI_ENABLE_SWARM=false
      - OMNI_ALLOW_LAN=false
      - OMNI_ENABLE_EXTERNAL_DEVICES=false
      - OMNI_ALLOW_EXTERNAL_NETWORK=false
      - OMNI_ALLOWED_NETWORK_HOSTS=omnitwin-redis,omnitwin-qdrant
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - HF_DATASETS_OFFLINE=1

  omnitwin-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: omnitwin-worker
    depends_on:
      omnitwin-redis:
        condition: service_healthy
      omnitwin-qdrant:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://omnitwin-redis:6379/0
      - REDIS_HOST=omnitwin-redis
      - QDRANT_HOST=omnitwin-qdrant
      - OMNI_OFFLINE_STRICT=true
      - OMNI_ENABLE_MODEL_DOWNLOADS=false
      - OMNI_ENABLE_SWARM=false
      - OMNI_ALLOW_LAN=false
      - OMNI_ENABLE_EXTERNAL_DEVICES=false
      - OMNI_ALLOW_EXTERNAL_NETWORK=false
      - OMNI_ALLOWED_NETWORK_HOSTS=omnitwin-redis,omnitwin-qdrant
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - HF_DATASETS_OFFLINE=1

  # -------------------------
  # RLHF Training Arena (UI)
  # -------------------------
  omnitwin-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: omnitwin-frontend
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - omnitwin-api
    environment:
      - NEXT_TELEMETRY_DISABLED=1

volumes:
  redis_data:
  qdrant_data:
