version: '3.8'

services:
  # -------------------------
  # Core Infrastructure
  # -------------------------
  omnitwin-redis:
    image: redis:7-alpine
    container_name: omnitwin-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  omnitwin-qdrant:
    image: qdrant/qdrant:latest
    container_name: omnitwin-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 5s
      timeout: 3s
      retries: 5

  # -------------------------
  # OmniTwin Application
  # -------------------------
  omnitwin-api:
    build: 
      context: .
      dockerfile: Dockerfile.api
    container_name: omnitwin-api
    ports:
      - "8000:8000"
    depends_on:
      omnitwin-redis:
        condition: service_healthy
      omnitwin-qdrant:
        condition: service_healthy
    environment:
      - REDIS_HOST=omnitwin-redis
      - QDRANT_HOST=omnitwin-qdrant

  omnitwin-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: omnitwin-worker
    depends_on:
      omnitwin-redis:
        condition: service_healthy
      omnitwin-qdrant:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://omnitwin-redis:6379/0
      - REDIS_HOST=omnitwin-redis
      - QDRANT_HOST=omnitwin-qdrant

  # -------------------------
  # RLHF Training Arena (UI)
  # -------------------------
  omnitwin-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: omnitwin-frontend
    ports:
      - "3000:3000"
    depends_on:
      - omnitwin-api

volumes:
  redis_data:
  qdrant_data:
