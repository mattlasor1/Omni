name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    env:
      OMNI_OFFLINE_STRICT: "true"
      OMNI_ENABLE_MODEL_DOWNLOADS: "false"
      OMNI_ENABLE_SWARM: "false"
      OMNI_ALLOW_LAN: "false"
      OMNI_ENABLE_EXTERNAL_DEVICES: "false"
      OMNI_ALLOW_EXTERNAL_NETWORK: "false"
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      HF_DATASETS_OFFLINE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
      - name: Import app
        run: python -c "from src.main import app; print(app.title)"
      - name: Run tests
        run: PYTHONPATH=. pytest tests -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Install frontend dependencies
        run: npm install
      - name: Build frontend
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  desktop:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: electron_app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install desktop dependencies
        run: npm install
      - name: Audit desktop runtime dependencies
        run: npm audit
